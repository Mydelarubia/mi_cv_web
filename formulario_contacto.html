<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi formulario de contacto</title>
    <link rel="stylesheet" href="style_formulario.css">
</head>
<body>
    <main>
        <form  action="https://api.web3forms.com/submit" method="POST">
            <input type="hidden" name="access_key" value="a05937f1-eb8c-4b3f-9859-24ff1fe27098">
          <fieldset class="formulario_contacto_input">
                <legend class="formulario_contacto">Datos de la empresa</legend>
                    <div class="campo">
                        <label for="Empresa">Nombre de la Empresa</label>
                        <input type="text" id="Empresa" name="Empresa" required>
                    </div>
                    <div class="campo">
                        <label for="nombre">Persona de contacto</label>
                        <input class="formulario_contacto_input" type="text" id="nombre" name="nombre" required>
                    </div>
                   
                    <div class="email_tel">
                        <div>
       
                     <label for="correo">Correo electrónico</label>
                        <input class="formulario_contacto_input" type="email" id="correo" name="recorreo" required placeholder="nombre@dominio.com">
                </div>
                    <div>
                        <label for="telefono">Teléfono</label>
                        <input class="formulario_contacto_input" type="tel" id="telefono" name="reclutador" placeholder="+34 600 000 000">
                    </div>
                </div>
            </fieldset>
            <fieldset class="formulario_contacto_input">
                <legend class="formulario_contacto">Mensaje</legend>
                    <div>
                        <label for="comentarios">Comentario</label>
                        <textarea id="comentario" name="comentario" rows="4" placeholder="Escribe tu comentario aquí..."></textarea>
                    </div>
                     
            </fieldset>
              <fieldset class="formulario_contacto_input">
    <legend class="formulario_contacto">Preferencias de contacto</legend>
    
    <div class="email_tel">
        <div class="campo">
            <label for="medio_contacto">Elegir una opción</label>
            <select class="formulario_contacto_input" id="medio_contacto" name="medio_contacto">
                <option value="email">email</option>
                <option value="teléfono">teléfono</option>
            </select>
        </div>
        
        <div class="campo">
            <label for="horario">Horario</label>
            <select class="formulario_contacto_input" id="horario" name="horario">
                <option value="mañana">mañana</option>
                <option value="tarde">tarde</option>
            </select>
        </div>
    </div> 
</fieldset>

            <button type="submit">Enviar formulario</button>

        </form>
    </main>
</body>
</html>
